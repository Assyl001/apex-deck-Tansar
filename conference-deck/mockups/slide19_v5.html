<head>

<title>Slide 19 · V5 · Altbridge Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
.center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14cqh 6cqw 12cqh;
  z-index: 4;
  text-align: center;
}

.arc-line {
  position: relative;
  font-family: 'Geist', sans-serif;
  font-weight: 500;
  font-size: 5.4cqw;
  line-height: 1.06;
  letter-spacing: -0.034em;
  color: var(--text-primary);
  max-width: 88cqw;
  animation: rise 1100ms 360ms var(--spring-smooth) both;
}
.arc-line .step {
  display: inline-block;
  padding: 0 0.05em;
}
.arc-line .arrow {
  display: inline-block;
  margin: 0 0.18em;
  font-weight: 300;
  color: var(--text-faint);
  transform: translateY(-0.05em);
}
.arc-line .l3 {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 600;
}
.arc-line .l4 {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
}

.subtitle {
  margin-top: 4.6cqh;
  font-family: 'Geist', sans-serif;
  font-weight: 400;
  font-size: 1.7cqw;
  line-height: 1.4;
  color: var(--text-secondary);
  letter-spacing: -0.008em;
  max-width: 76cqw;
  animation: rise 900ms 600ms var(--spring-smooth) both;
}
.subtitle strong { color: var(--text-primary); font-weight: 600; }
.subtitle em { font-style: italic; color: var(--text-primary); font-weight: 500; }

.thanks {
  margin-top: 8cqh;
  font-family: 'Geist', sans-serif;
  font-weight: 300;
  font-size: 4.2cqw;
  line-height: 1;
  letter-spacing: -0.028em;
  color: var(--text-primary);
  animation: rise 1100ms 880ms var(--spring-smooth) both;
}
.thanks .em {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 500;
}

/* Contact strip */
.contact {
  position: absolute;
  left: 4.5cqw; right: 4.5cqw;
  bottom: 5cqh;
  padding-top: 2.4cqh;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 2cqw;
  z-index: 4;
  font-family: 'Geist Mono', 'Geist', monospace;
  font-size: 0.95cqw;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-secondary);
  animation: fade 900ms 1080ms var(--spring-smooth) both;
}
.contact .left {
  display: flex;
  align-items: baseline;
  gap: 0.7cqw;
}
.contact .name {
  color: var(--text-primary);
  font-weight: 700;
}
.contact .sep { color: var(--text-faint); }
.contact .email {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 600;
  text-transform: lowercase;
  letter-spacing: 0.04em;
}
.contact .right {
  display: flex;
  align-items: baseline;
  gap: 0.7cqw;
}
</style>
</head>
