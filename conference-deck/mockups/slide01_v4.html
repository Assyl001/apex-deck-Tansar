<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 01 · V4 · Light + Liquid Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f7f2ea;
  --paper-soft: #ede6d9;
  --ink: #14110d;
  --ink-soft: #4a423a;
  --ink-muted: #8a7f72;
  --ink-faint: #b8ad9e;
  --magenta: #ee3a65;
  --plum: #a7237b;
  --blue: #194bb9;
  --navy: #0f2c6c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #1a1713;
  font-family: "IBM Plex Sans", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.slide {
  width: min(100vw, calc(100vh * 16 / 9));
  aspect-ratio: 16 / 9;
  position: relative; overflow: hidden;
  container-type: inline-size;
  background: var(--paper);
  color: var(--ink);
  font-feature-settings: "tnum", "ss01";
}

/* Color tint layer — gives glass something to refract */
.tint-blob {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  filter: blur(60px);
}
.tint-blob.magenta {
  width: 55cqw; height: 55cqw;
  top: -10cqh; right: -8cqw;
  background: radial-gradient(circle, rgba(238, 58, 101, 0.22) 0%, rgba(238, 58, 101, 0) 65%);
}
.tint-blob.blue {
  width: 50cqw; height: 50cqw;
  bottom: -15cqh; left: -10cqw;
  background: radial-gradient(circle, rgba(25, 75, 185, 0.18) 0%, rgba(25, 75, 185, 0) 65%);
}
.tint-blob.plum {
  width: 30cqw; height: 30cqw;
  top: 40cqh; left: 35cqw;
  background: radial-gradient(circle, rgba(167, 35, 123, 0.1) 0%, rgba(167, 35, 123, 0) 65%);
}

/* Paper grain */
.slide::before {
  content: ""; position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.07  0 0 0 0 0.05  0 0 0 0.3 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: 0.8; mix-blend-mode: multiply;
  pointer-events: none; z-index: 2;
}

/* Liquid Glass base */
.glass {
  position: relative;
  background: rgba(255, 252, 244, 0.5);
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: 22px;
  box-shadow:
    inset 0 1.5px 0 rgba(255, 255, 255, 0.85),
    inset 0 -1px 0 rgba(42, 35, 28, 0.04),
    0 8px 32px rgba(42, 35, 28, 0.08),
    0 2px 8px rgba(42, 35, 28, 0.04);
  overflow: hidden;
}
.glass::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.05) 35%, rgba(255, 255, 255, 0.15) 70%, rgba(255, 255, 255, 0.35) 100%);
  pointer-events: none;
  border-radius: inherit;
}
.glass > * { position: relative; z-index: 1; }

/* Logo mark — top-left anchor */
.logo-mark {
  position: absolute;
  top: 5cqh; left: 4.5cqw;
  width: 5.5cqw; height: auto;
  z-index: 5;
  display: block;
  animation: rise 900ms 160ms cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* Hero */
.hero {
  position: absolute;
  left: 4.5cqw;
  right: 4.5cqw;
  top: 28cqh;
  z-index: 4;
}

.kicker {
  font-family: "IBM Plex Mono", monospace;
  font-size: 1.1cqw;
  font-weight: 500;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--magenta);
  margin-bottom: 3cqh;
  display: flex; align-items: center; gap: 0.7cqw;
  animation: rise 800ms 240ms cubic-bezier(0.22, 1, 0.36, 1) both;
}
.kicker::before {
  content: "";
  display: inline-block;
  width: 2.4cqw; height: 2px;
  background: var(--magenta);
}

.hero-title {
  font-family: "Fraunces", serif;
  font-variation-settings: "opsz" 144, "SOFT" 25;
  font-weight: 480;
  font-size: 9.2cqw;
  line-height: 0.94;
  letter-spacing: -0.038em;
  color: var(--ink);
  max-width: 78cqw;
  animation: rise 900ms 340ms cubic-bezier(0.22, 1, 0.36, 1) both;
}
.hero-title .em {
  font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 55;
  font-weight: 440;
}

.hero-sub {
  margin-top: 4cqh;
  font-family: "Fraunces", serif;
  font-style: italic;
  font-variation-settings: "opsz" 60, "SOFT" 55;
  font-weight: 400;
  font-size: 2.5cqw;
  line-height: 1.25;
  color: var(--ink-soft);
  letter-spacing: -0.008em;
  max-width: 58cqw;
  animation: rise 900ms 500ms cubic-bezier(0.22, 1, 0.36, 1) both;
}
.hero-sub .em {
  font-style: normal;
  font-weight: 500;
  color: var(--ink);
}

/* Byline — Liquid Glass card */
.byline-card {
  position: absolute;
  left: 4.5cqw;
  bottom: 5cqh;
  padding: 2.8cqh 2.4cqw 2.8cqh 2.4cqw;
  min-width: 44cqw;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.3cqh 1.8cqw;
  align-items: baseline;
  z-index: 4;
  animation: rise 900ms 680ms cubic-bezier(0.22, 1, 0.36, 1) both;
}

.byline-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.92cqw;
  font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-muted);
  white-space: nowrap;
  padding-top: 0.3cqh;
}

.byline-value {
  font-family: "IBM Plex Sans", sans-serif;
  font-size: 1.6cqw;
  font-weight: 500;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.byline-value .soft {
  color: var(--ink-soft);
  font-weight: 400;
}
.byline-value .name {
  font-family: "Fraunces", serif;
  font-variation-settings: "opsz" 48, "SOFT" 35;
  font-weight: 500;
  font-size: 1.85cqw;
  letter-spacing: -0.01em;
}

/* Folio — Liquid Glass chip top-right */
.folio-chip {
  position: absolute;
  top: 5cqh; right: 4.5cqw;
  padding: 1.6cqh 1.6cqw;
  display: flex; align-items: baseline; gap: 0.7cqw;
  z-index: 4;
  border-radius: 16px;
  animation: rise 900ms 240ms cubic-bezier(0.22, 1, 0.36, 1) both;
}
.folio-chip .folio-num {
  font-family: "Fraunces", serif;
  font-variation-settings: "opsz" 72, "SOFT" 30;
  font-weight: 500;
  font-size: 2.2cqw;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.01em;
  font-feature-settings: "tnum";
}
.folio-chip .folio-sep {
  color: var(--ink-muted);
  font-size: 1.5cqw;
  font-weight: 400;
}
.folio-chip .folio-total {
  font-family: "Fraunces", serif;
  font-variation-settings: "opsz" 60, "SOFT" 30;
  font-weight: 400;
  font-size: 1.5cqw;
  color: var(--ink-muted);
  font-feature-settings: "tnum";
}

/* Venue tag — Liquid Glass chip bottom-right */
.venue-chip {
  position: absolute;
  right: 4.5cqw; bottom: 5cqh;
  padding: 2cqh 1.8cqw;
  display: flex; flex-direction: column; gap: 0.5cqh;
  z-index: 4;
  border-radius: 16px;
  min-width: 22cqw;
  animation: rise 900ms 820ms cubic-bezier(0.22, 1, 0.36, 1) both;
}
.venue-chip .venue-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.82cqw;
  font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.venue-chip .venue-name {
  font-family: "Fraunces", serif;
  font-variation-settings: "opsz" 48, "SOFT" 35;
  font-weight: 500;
  font-size: 1.5cqw;
  color: var(--ink);
  line-height: 1.15;
  letter-spacing: -0.005em;
}
.venue-chip .venue-meta {
  font-family: "IBM Plex Sans", sans-serif;
  font-size: 1.1cqw;
  font-weight: 400;
  color: var(--ink-soft);
  letter-spacing: -0.003em;
}

@keyframes rise {
  from { transform: translateY(24px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</head>
<body>
<div class="slide">
  <div class="tint-blob magenta"></div>
  <div class="tint-blob blue"></div>
  <div class="tint-blob plum"></div>

  <!-- Real Altbridge logo -->
  <svg class="logo-mark" viewBox="550 264 394 372" xmlns="http://www.w3.org/2000/svg" aria-label="Altbridge">
    <defs>
      <linearGradient gradientTransform="matrix(325.187,0,0,300.71,585.481,295.253)" gradientUnits="userSpaceOnUse" x2="1" id="g1">
        <stop stop-color="#ee3a65" offset="0"/>
        <stop stop-color="#a7237b" offset="1"/>
      </linearGradient>
      <linearGradient gradientTransform="matrix(213.557,107.505,-122.141,242.631,657.866,467.538)" gradientUnits="userSpaceOnUse" x2="1" id="g2">
        <stop stop-color="#000000" offset="0"/>
        <stop stop-color="#0f2c6c" offset=".564"/>
        <stop stop-color="#194bb9" offset="1"/>
      </linearGradient>
    </defs>
    <path d="m910.7 589.8l-0.6 0.3c-22.4 10.2-48.5 6.8-67.9-8.4-19.2-15-49.8-31.1-94.3-33 0 0-52.6 1-94.1 33.2-11.8 9.2-26.2 14-40.6 14-9.4 0-18.9-2-27.7-6.1l0.7-0.6-0.7-0.3 7.8-16.8 118.5-253.8c3.3-7 8.5-12.8 14.8-16.8 6.3-4 13.7-6.2 21.5-6.2 15.5 0 29.6 9 36.2 23l91.6 196.1 13.4 28.7c-18-18.4-39-32.6-61.6-42.6q-5.8-2.6-11.8-4.8l-67.8-145.9-68 146.2-12.2 26.3 0.7-0.6c0 0 45.2-23.5 99.7-16.8 20.3 2.5 40.4 7.9 59.4 16.3 26.4 11.7 50.7 29 70.5 52.3q6.3 7.4 12 15.6 0.2 0.4 0.5 0.7z" fill="url(#g1)"/>
    <path d="m910.7 589.8l-0.6 0.3c-22.4 10.2-48.5 6.8-67.9-8.4-19.2-15-49.8-31.1-94.3-33 0 0-52.6 1-94.1 33.2-11.8 9.2-26.2 14-40.6 14-9.4 0-18.9-2-27.7-6.1l0.7-0.6-0.7-0.3 7.8-16.8 118.5-253.8c3.3-7 8.5-12.8 14.8-16.8 6.3-4 13.7-6.2 21.5-6.2 15.5 0 29.6 9 36.2 23l91.6 196.1 13.4 28.7c-18-18.4-39-32.6-61.6-42.6q-5.8-2.6-11.8-4.8l-67.8-145.9-68 146.2-12.2 26.3 0.7-0.6c0 0 45.2-23.5 99.7-16.8 20.3 2.5 40.4 7.9 59.4 16.3 26.4 11.7 50.7 29 70.5 52.3q6.3 7.4 12 15.6 0.2 0.4 0.5 0.7z" fill="url(#g2)"/>
  </svg>

  <!-- Folio chip (glass) -->
  <div class="folio-chip glass">
    <span class="folio-num">01</span>
    <span class="folio-sep">/</span>
    <span class="folio-total">19</span>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="kicker">From L1 to L4 · A Two-Year Journey</div>
    <h1 class="hero-title">AI, in Investment <span class="em">Activities.</span></h1>
    <div class="hero-sub">From <span class="em">analyst-assist</span> to a <span class="em">validated, audited pipeline</span> running on live capital.</div>
  </div>

  <!-- Byline (glass) -->
  <div class="byline-card glass">
    <div class="byline-label">Speaker</div>
    <div class="byline-value"><span class="name">Assyl Akhmet</span><br><span class="soft">Chief Product Officer, Altbridge</span></div>
  </div>

  <!-- Venue (glass) -->
  <div class="venue-chip glass">
    <div class="venue-label">Occasion</div>
    <div class="venue-name">Tansar Capital · Investors Annual Meeting</div>
    <div class="venue-meta">Almaty · May 6, 2026</div>
  </div>
</div>
</body>
